name: Hugging Face Space Keep Alive

on:
  schedule:
    # 每 6 小时运行一次 (UTC 时间)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          # 默认对你之前的 myhermes-agent 进行保活
          # 你可以在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中设置 HF_SPACE_URL
          URL="${{ secrets.HF_SPACE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://pengjoe12802-claude-code.hf.space/lab"
          fi
          echo "Pinging $URL ..."
          curl -sL --fail "$URL" -o /dev/null || echo "Ping failed, but continuing..."
